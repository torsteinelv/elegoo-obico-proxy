name: Build and Push Proxy Image

on:
  push:
    branches:
      - main
      - master
    tags:
      - 'v*'  # <--- VIGTIG: Dette tvinger Actions til å kjøre når du pusher en tag (f.eks v1.0.0-beta)

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker Metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            # Kjører du på main/master, lages som vanlig :latest
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master' }}
            
            # Hvis du pusher en Git-tag (f.eks v1.0.0-beta), blir Docker-imaget tagget med nøyaktig samme navn!
            type=ref,event=tag
            
            # Hvis taggen inneholder ordet 'beta', lager den i tillegg en universell :beta tag
            type=raw,value=beta,enable=${{ startsWith(github.ref, 'refs/tags/v') && contains(github.ref, 'beta') }}

      - name: Build and Push Docker Image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ status.meta.outputs.tags }}
          labels: ${{ status.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
