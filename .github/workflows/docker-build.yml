name: Build and Push Proxy Container

on:
  push:
    branches: [ "main", "master" ]
    tags: [ 'v*.*.*' ]
  pull_request:
    branches: [ "main", "master" ]

env:
  REGISTRY: ghcr.io
  # Dette blir automatisk f.eks. "ghcr.io/ditt-brukernavn/elegoo-cc2-obico-proxy"
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # Sette opp QEMU gjør at vi kan bygge for Raspberry Pi (ARM64) selv om GitHub kjører på x86 PC-er
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      # Set up Docker Buildx for avansert caching og multi-arkitektur-bygg
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # Logg inn på GitHub Container Registry (bruker GitHubs innebygde token automatisk)
      - name: Log into registry ${{ env.REGISTRY }}
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Genererer merkelapper (tags) som f.eks. :latest eller :main basert på git-historikken
      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}

      # Bygg og (hvis det ikke er en PR) push bildet til GitHub Packages
      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          # Innebygd GitHub-cache gjør at påfølgende bygg går lynraskt
          cache-from: type=gha
          cache-to: type=gha,mode=max
