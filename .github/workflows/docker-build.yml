name: Build and Push Proxy Image

on:
  push:
    branches:
      - main
      - master
    tags:
      - 'v*'  # Kjører automatisk når du oppretter en Git-tag (f.eks. v1.0.0-beta)

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    
    # 🔥 Gir skriptet eksplisitt tillatelse til å skrive pakker til ghcr.io
    permissions:
      contents: read    # Nødvendig for å sjekke ut koden (checkout)
      packages: write   # Nødvendig for å dytte imaget til GitHub Container Registry

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker Metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            # Lager :latest hvis du dytter direkte til main eller master
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master' }}
            
            # Hvis du dytter en Git-tag, merkes Docker-imaget med akkurat samme versjon (f.eks :v1.0.0-beta)
            type=ref,event=tag
            
            # Hvis taggen inneholder ordet 'beta', lager den også en flytende :beta tag automatisk
            type=raw,value=beta,enable=${{ startsWith(github.ref, 'refs/tags/v') && contains(github.ref, 'beta') }}

      - name: Build and Push Docker Image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}     # ✅ Fikset fra 'status' til 'steps'
          labels: ${{ steps.meta.outputs.labels }}   # ✅ Fikset fra 'status' til 'steps'
          cache-from: type=gha
          cache-to: type=gha,mode=max
